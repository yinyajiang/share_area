name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${{ github.ref_name }}"
            # strip leading 'v' from tag
            ver="${ver#v}"
          else
            ver="1.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        shell: pwsh
        run: |
          # Qt6_DIR: C:\...\Qt\6.10.3\msvc2022_64\lib\cmake\Qt6
          # CMAKE_PREFIX_PATH: C:\...\Qt\6.10.3\msvc2022_64
          $prefix = $env:Qt6_DIR -replace '[/\\]lib[/\\]cmake[/\\]Qt6$', ''
          cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=$prefix"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Build Installer
        run: iscc script/setup.iss /DMyAppVersion="${{ steps.version.outputs.version }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareArea-${{ steps.version.outputs.version }}-Windows
          path: output/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.exe
