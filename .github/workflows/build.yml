name: Build ShareArea

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows installer'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS DMG'
        required: false
        default: true
        type: boolean

jobs:
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${{ github.ref_name }}"
            # strip leading 'v' from tag
            ver="${ver#v}"
          else
            ver="1.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        shell: pwsh
        run: |
          # install-qt-action 将 windeployqt 加入 PATH，从中反推 Qt 安装根目录
          # windeployqt 路径: C:\...\Qt\6.10.3\msvc2022_64\bin\windeployqt.exe
          # Qt 前缀:         C:\...\Qt\6.10.3\msvc2022_64
          $qtBin = Split-Path (Get-Command windeployqt).Source
          $qtPrefix = Split-Path $qtBin
          cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=$qtPrefix" "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Download InnoSetup Chinese language
        shell: pwsh
        run: |
          $islDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$islDir\ChineseSimplified.isl"

      - name: Build Installer
        run: iscc script/setup.iss /DMyAppVersion="${{ steps.version.outputs.version }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareArea-${{ steps.version.outputs.version }}-Windows
          path: output/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.exe

  build-macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: 'mac'
          target: 'desktop'
          cache: true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${{ github.ref_name }}"
            ver="${ver#v}"
          else
            ver="1.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          qtBin="$(dirname "$(which macdeployqt)")"
          qtPrefix="$(dirname "$qtBin")"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_PREFIX_PATH=$qtPrefix" \
            "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt libraries
        run: macdeployqt build/ShareArea.app -verbose=2

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -R build/ShareArea.app dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "ShareArea" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "ShareArea-${{ steps.version.outputs.version }}-macOS.dmg"
          rm -rf dmg_temp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareArea-${{ steps.version.outputs.version }}-macOS
          path: ShareArea-*.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ShareArea-*.dmg
