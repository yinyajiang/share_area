name: Build ShareArea

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows installer'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS DMG'
        required: false
        default: true
        type: boolean
      version:
        description: 'Version number. Leave empty to infer from tag or run number'
        required: false
        default: ''
        type: string
      release:
        description: 'Publish Windows and macOS packages as a GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release inputs
        run: |
          if [[ "${{ inputs.release }}" == "true" && ( "${{ inputs.build_windows }}" != "true" || "${{ inputs.build_macos }}" != "true" ) ]]; then
            echo "When release is selected, both build_windows and build_macos must also be selected."
            exit 1
          fi

  build-windows:
    needs: validate-inputs
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Determine version
        id: version
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ -n "$VERSION_INPUT" ]]; then
            ver="$VERSION_INPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${{ github.ref_name }}"
            # strip leading 'v' from tag
            ver="${ver#v}"
          else
            ver="1.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        shell: pwsh
        run: |
          # install-qt-action 将 windeployqt 加入 PATH，从中反推 Qt 安装根目录
          # windeployqt 路径: C:\...\Qt\6.10.3\msvc2022_64\bin\windeployqt.exe
          # Qt 前缀:         C:\...\Qt\6.10.3\msvc2022_64
          $qtBin = Split-Path (Get-Command windeployqt).Source
          $qtPrefix = Split-Path $qtBin
          cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=$qtPrefix" "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt libraries
        shell: pwsh
        run: windeployqt --verbose 2 build\Release\ShareArea.exe

      - name: Install InnoSetup
        run: choco install innosetup -y

      - name: Download InnoSetup Chinese language
        shell: pwsh
        run: |
          $islDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$islDir\ChineseSimplified.isl"

      - name: Build Installer
        run: iscc build\setup.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareArea-${{ steps.version.outputs.version }}-Windows
          path: output/*.exe

  build-macos:
    needs: validate-inputs
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.10.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          host: 'mac'
          target: 'desktop'
          cache: true

      - name: Determine version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ -n "$VERSION_INPUT" ]]; then
            ver="$VERSION_INPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${{ github.ref_name }}"
            ver="${ver#v}"
          else
            ver="1.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          qtBin="$(dirname "$(which macdeployqt)")"
          qtPrefix="$(dirname "$qtBin")"
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_PREFIX_PATH=$qtPrefix" \
            "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt libraries
        run: macdeployqt build/ShareArea.app -verbose=2

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -R build/ShareArea.app dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "ShareArea" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "ShareArea-${{ steps.version.outputs.version }}-macOS.dmg"
          rm -rf dmg_temp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShareArea-${{ steps.version.outputs.version }}-macOS
          path: ShareArea-*.dmg

  publish-release:
    needs: [validate-inputs, build-windows, build-macos]
    if: ${{ inputs.release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ -n "$VERSION_INPUT" ]]; then
            ver="$VERSION_INPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ver="${{ github.ref_name }}"
            ver="${ver#v}"
          else
            ver="1.0.0-dev.${{ github.run_number }}"
          fi

          if [[ "$ver" == v* ]]; then
            tag="$ver"
          else
            tag="v$ver"
          fi

          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ShareArea ${{ steps.version.outputs.version }}
          files: release-assets/*
